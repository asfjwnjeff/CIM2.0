  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

    $(function() {
      // 返回按钮 - 点击后检查是否有未保存改动，有则显示确认弹窗，无则直接跳转
      $('#btn-back, #btn-cancel').on('click', function() {
        const hasChanges = true; // 简单起见，默认有未保存改动
        if (hasChanges) {
          $('#modal-discard').removeClass('hidden');
        } else {
          window.location.href = 'quotes.html';
        }
      });

      // 确认离开弹窗 - 取消按钮
      $('#btn-discard-cancel').on('click', function() {
        $('#modal-discard').addClass('hidden');
      });

      // 确认离开弹窗 - 确定离开按钮
      $('#btn-discard-confirm').on('click', function() {
        window.location.href = 'quotes.html';
      });

      // 保存草稿按钮 - 点击后显示保存成功提示，然后跳转列表页
      $('#btn-save-draft').on('click', function() {
        console.log('保存草稿功能：');
        // 1. 收集表单数据
        // 2. 验证必填项
        // 3. 调用保存接口
        // 4. 显示保存成功提示
        // 5. 跳转到列表页
        alert('草稿保存成功！');
        window.location.href = 'quotes.html';
      });

      // 提交审批按钮 - 点击后验证表单，然后提交审批并跳转详情页
      $('#btn-submit-approval').on('click', function() {
        console.log('提交审批功能：');
        // 1. 收集表单数据
        // 2. 验证必填项和数据格式
        // 3. 调用提交审批接口
        // 4. 显示提交成功提示
        // 5. 跳转到详情页
        alert('提交审批成功！');
        window.location.href = 'quotes-detail.html?id=1';
      });

      // 添加服务项目按钮 - 点击后添加新的服务项目行
      $('#btn-add-item').on('click', function() {
        console.log('添加服务项目功能：');
        // 1. 在服务项目列表末尾添加新的行
        // 2. 新行包含所有必要的输入字段
        // 3. 自动聚焦到项目名称输入框
        const newItem = `
          <div class="grid grid-cols-12 px-4 py-3 items-center hover:bg-surface-container/50 transition-colors">
            <div class="col-span-3">
              <input type="text" value="" placeholder="请输入项目名称" class="w-full bg-transparent border-none text-sm text-on-surface focus:outline-none"/>
            </div>
            <div class="col-span-2">
              <input type="text" value="" placeholder="描述" class="w-full bg-transparent border-none text-sm text-on-surface-variant focus:outline-none"/>
            </div>
            <div class="col-span-1">
              <input type="number" value="1" class="w-full bg-surface-container border-none rounded-md px-2 py-1 text-sm text-center text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
            </div>
            <div class="col-span-1">
              <select class="w-full bg-surface-container border-none rounded-md px-2 py-1 text-sm text-center text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors">
                <option>小时</option>
                <option>天</option>
                <option>次</option>
                <option>项</option>
              </select>
            </div>
            <div class="col-span-2">
              <input type="number" value="0" class="w-full bg-surface-container border-none rounded-md px-2 py-1 text-sm text-right text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
            </div>
            <div class="col-span-1">
              <input type="number" value="0" class="w-full bg-surface-container border-none rounded-md px-2 py-1 text-sm text-center text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
            </div>
            <div class="col-span-1 text-sm font-semibold text-on-surface text-right">¥0</div>
            <div class="col-span-1 flex justify-center">
              <button type="button" class="btn-delete-item p-1 text-on-surface-variant hover:text-error transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        `;
        $('#service-items').append(newItem);
        lucide.createIcons();
      });

      // 删除服务项目按钮 - 点击后删除对应的服务项目行
      $('#service-items').on('click', '.btn-delete-item', function() {
        console.log('删除服务项目功能：');
        // 1. 确认删除
        // 2. 删除对应的行
        // 3. 重新计算总计
        $(this).closest('.grid').remove();
      });
    });

    lucide.createIcons();
  </script>
</body>
