  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

            <button id="btn-save-draft" class="bg-surface-container text-on-surface border-none px-5 py-2 rounded-md text-sm font-medium hover:bg-surface-container-high active:scale-[0.98] transition-all">
              暂存
            </button>
            <button id="btn-submit" class="bg-primary text-on-primary px-5 py-2 rounded-md text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center gap-2">
              <i data-lucide="send" class="w-4 h-4"></i>
              提交
            </button>
          </div>
        </div>
      </main>
      <!-- @main-content:end -->
    </div>
  </div>

  <script>
    $(function() {
      // 返回按钮 - 点击后返回到风控审批列表页
      $('#btn-back').on('click', function() {
        window.location.href = 'approvals.html';
      });

      // 取消按钮 - 点击后返回到风控审批列表页
      $('#btn-cancel').on('click', function() {
        window.location.href = 'approvals.html';
      });

      // 清空按钮 - 点击后清空所有表单字段
      $('#btn-clear').on('click', function() {
        // 清空所有输入框
        $('input[type="text"], textarea').val('');
        // 重置所有下拉选择框
        $('select').val('');
        console.log('表单已清空');
      });

      // 暂存按钮 - 点击后保存为草稿
      $('#btn-save-draft').on('click', function() {
        // 收集表单数据
        const formData = {
          tradeAgent: $('#input-trade-agent').val(),
          serviceProduct: $('#input-service-product').val(),
          businessType: $('#input-business-type').val(),
          goodsType: $('#input-goods-type').val(),
          monthlyVolume: $('#input-monthly-volume').val(),
          monthlyInvoice: $('#input-monthly-invoice').val(),
          customsKpi: $('#input-customs-kpi').val(),
          transportKpi: $('#input-transport-kpi').val(),
          warehouseRequirement: $('#input-warehouse-requirement').val(),
          customizedService: $('#input-customized-service').val(),
          customizedDescription: $('#input-customized-description').val(),
          companyName: $('#input-company-name').val(),
          englishName: $('#input-english-name').val(),
          parentCompany: $('#input-parent-company').val(),
          subsidiaryCompany: $('#input-subsidiary-company').val(),
          riskPurpose: $('#input-risk-purpose').val(),
          companyRelation: $('#input-company-relation').val(),
          mainCustomers: $('#input-main-customers').val(),
          systemCode: $('#input-system-code').val(),
          opportunity: $('#input-opportunity').val(),
          invoiceInfo: $('#input-invoice-info').val(),
          settlementPeriod: $('#input-settlement-period').val(),
          contactPerson: $('#input-contact-person').val()
        };
        
        console.log('更新草稿，数据：', formData);
        // 显示暂存成功提示（实际项目中应使用Toast组件）
        alert('更新成功！');
      });

      // 提交按钮 - 点击后提交审批
      $('#btn-submit').on('click', function() {
        // 简单的必填项验证
        const requiredFields = [
          { id: 'input-company-name', name: '公司全称' },
          { id: 'input-service-product', name: '服务产品' },
          { id: 'input-risk-purpose', name: '风险控制目的' }
        ];
        
        let hasError = false;
        for (const field of requiredFields) {
          if (!$('#' + field.id).val()) {
            alert('请填写必填项：' + field.name);
            hasError = true;
            break;
          }
        }
        
        if (hasError) return;
        
        console.log('提交审批，跳转到审批列表页');
        // 提交成功后跳转到列表页
        window.location.href = 'approvals.html';
      });
    });
    
    lucide.createIcons();
  </script>
</body>

</html>
