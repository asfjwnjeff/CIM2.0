<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #1E40AF;
      --color-primary-container:    #DBEAFE;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #FFFFFF;
      --color-surface-container-lowest:   #F9FAFB;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F3F4F6;
      --color-surface-container-high:     #E5E7EB;
      --color-surface-container-highest:  #D1D5DB;
      /* === 文字 === */
      --color-on-surface:           #111827;
      --color-on-surface-variant:   #6B7280;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #D1D5DB;
      --color-outline-variant:  #E5E7EB;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.10);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.15);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.20);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->
  <div class="flex" style="height: 100vh;">
    <aside class="w-64 shrink-0 bg-surface-container-lowest border-r border-outline-variant/20 overflow-y-auto">
      <div class="p-4 border-b border-outline-variant/20">
        <div class="flex items-center gap-2">
          <i data-lucide="building" class="text-primary w-6 h-6"></i>
          <span class="font-bold text-lg">CIM V2.0</span>
        </div>
      </div>
      <div class="p-3 space-y-1">
        <a href="customers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="users" class="w-4 h-4"></i>客户管理
        </a>
        <a href="opportunities.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="target" class="w-4 h-4"></i>商机管理
        </a>
        <a href="followup.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="message-square" class="w-4 h-4"></i>客户跟进
        </a>
        <a href="quotes.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="file-text" class="w-4 h-4"></i>售前报价
        </a>
        <a href="approvals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="shield-check" class="w-4 h-4"></i>风控审批
        </a>
        <div class="pt-2 mt-2 border-t border-outline-variant/20">
          <a href="rules.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
            <i data-lucide="settings" class="w-4 h-4"></i>规则配置
          </a>
        </div>
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-surface border-b border-outline-variant/20 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-4">
          <h1 class="text-xl font-semibold" id="page-title">新增结算主体</h1>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center text-sm font-medium">初</div>
            <span class="text-sm text-on-surface">小初</span>
          </div>
        </div>
      </header>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

      <!-- @main-content:start -->
      <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
        <!-- 页面内容 -->
        <div class="max-w-4xl mx-auto">
          <!-- 返回按钮 -->
          <div class="mb-6">
            <button id="btn-back" class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              <span class="text-sm font-medium">返回结算主体列表</span>
            </button>
          </div>

          <!-- 表单卡片 -->
          <div class="bg-surface rounded-lg shadow-card p-6">
            <form id="form-settlement-entity">
              <!-- 基本信息区域 -->
              <div class="space-y-6">
                <!-- 主体名称 -->
                <div>
                  <label for="input-name" class="block text-sm font-medium text-on-surface mb-1.5">主体名称 <span class="text-error">*</span></label>
                  <input type="text" id="input-name" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入主体名称">
                </div>

                <!-- 主体代码和统一社会信用代码 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label for="input-code" class="block text-sm font-medium text-on-surface mb-1.5">主体代码 <span class="text-error">*</span></label>
                    <input type="text" id="input-code" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入主体代码">
                  </div>
                  <div>
                    <label for="input-credit-code" class="block text-sm font-medium text-on-surface mb-1.5">统一社会信用代码</label>
                    <input type="text" id="input-credit-code" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入统一社会信用代码">
                  </div>
                </div>

                <!-- 纳税人识别号和银行账号 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label for="input-tax-number" class="block text-sm font-medium text-on-surface mb-1.5">纳税人识别号</label>
                    <input type="text" id="input-tax-number" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入纳税人识别号">
                  </div>
                  <div>
                    <label for="input-bank-account" class="block text-sm font-medium text-on-surface mb-1.5">银行账号</label>
                    <input type="text" id="input-bank-account" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入银行账号">
                  </div>
                </div>

                <!-- 开户行和状态 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label for="input-bank-name" class="block text-sm font-medium text-on-surface mb-1.5">开户行</label>
                    <input type="text" id="input-bank-name" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="请输入开户行">
                  </div>
                  <div>
                    <label for="select-status" class="block text-sm font-medium text-on-surface mb-1.5">状态 <span class="text-error">*</span></label>
                    <select id="select-status" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors">
                      <option value="active">启用</option>
                      <option value="inactive">停用</option>
                    </select>
                  </div>
                </div>

                <!-- 成立日期 -->
                <div>
                  <label for="input-founding-date" class="block text-sm font-medium text-on-surface mb-1.5">成立日期</label>
                  <input type="date" id="input-founding-date" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors">
                </div>

                <!-- 备注 -->
                <div>
                  <label for="textarea-remark" class="block text-sm font-medium text-on-surface mb-1.5">备注</label>
                  <textarea id="textarea-remark" rows="4" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors resize-none" placeholder="请输入备注信息"></textarea>
                </div>
              </div>

              <!-- 操作按钮 -->
              <div class="flex items-center justify-end gap-4 mt-8 pt-6 border-t border-outline-variant/20">
                <button type="button" id="btn-cancel" class="bg-surface-container text-on-surface border-none px-4 py-2 rounded-md text-sm font-medium hover:bg-surface-container-high active:scale-[0.98] transition-all">取消</button>
                <button type="button" id="btn-save" class="bg-primary text-on-primary px-4 py-2 rounded-md text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center gap-2">
                  <i data-lucide="save" class="w-3.5 h-3.5"></i>保存
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
      <!-- @main-content:end -->
    </div>
  </div>

  <script>
    $(function() {
      // 返回按钮 - 点击后跳转回结算主体列表页
      $('#btn-back').on('click', function() {
        window.location.href = 'settlement-entities.html';
      });

      // 取消按钮 - 点击后跳转回结算主体列表页
      $('#btn-cancel').on('click', function() {
        window.location.href = 'settlement-entities.html';
      });

      // 保存按钮 - 点击后保存数据并跳转回列表页
      $('#btn-save').on('click', function() {
        // 获取表单数据
        const name = $('#input-name').val();
        const code = $('#input-code').val();
        const status = $('#select-status').val();
        
        // 简单验证必填字段
        if (!name || !code) {
          alert('请填写必填字段：主体名称和主体代码');
          return;
        }
        
        // 这里应该调用API保存数据，原型中直接模拟保存成功
        console.log('保存结算主体:', {
          name: name,
          code: code,
          creditCode: $('#input-credit-code').val(),
          taxNumber: $('#input-tax-number').val(),
          bankAccount: $('#input-bank-account').val(),
          bankName: $('#input-bank-name').val(),
          status: status,
          foundingDate: $('#input-founding-date').val(),
          remark: $('#textarea-remark').val()
        });
        
        // 模拟保存成功后跳转
        alert('保存成功！');
        window.location.href = 'settlement-entities.html';
      });
    });
  </script>
  <script>lucide.createIcons();</script>
</body>

</html>
