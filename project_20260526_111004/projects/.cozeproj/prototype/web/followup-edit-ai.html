  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

  <script>
    $(function() {
      // 返回按钮 - 点击返回上一页
      $('#btn-back').on('click', function() {
        window.history.back();
      });

      // 取消按钮 - 点击返回上一页
      $('#btn-cancel, #btn-cancel-bottom').on('click', function() {
        window.history.back();
      });

      // 保存按钮 - 点击保存跟进记录
      $('#btn-save, #btn-save-bottom').on('click', function() {
        console.log('保存跟进记录');
        alert('保存成功！');
        window.history.back();
      });

      // 播放音频按钮 - 点击播放/暂停录音
      $('#btn-play-audio').on('click', function() {
        const icon = $(this).find('i');
        if (icon.data('lucide') === 'play') {
          icon.attr('data-lucide', 'pause');
          console.log('开始播放录音');
        } else {
          icon.attr('data-lucide', 'play');
          console.log('暂停播放录音');
        }
        lucide.createIcons();
      });

      // 播放速度按钮 - 点击切换播放速度
      $('#btn-audio-speed').on('click', function() {
        const speeds = ['1x', '1.5x', '2x', '0.5x'];
        const currentSpeed = $(this).text();
        const currentIndex = speeds.indexOf(currentSpeed);
        const nextIndex = (currentIndex + 1) % speeds.length;
        $(this).text(speeds[nextIndex]);
        console.log('切换播放速度为', speeds[nextIndex]);
      });

      // 重新生成纪要按钮 - 点击重新生成会议纪要
      $('#btn-regenerate-summary').on('click', function() {

        alert('正在重新生成会议纪要...');
      });

      // 添加关键要点按钮 - 点击添加新的关键要点

        const newPoint = `

        $('#key-points-list').append(newPoint);
        lucide.createIcons();

      });

            </div>

        `;
        $('#action-items-list').append(newItem);
        console.log('添加待办事项');
      });

      // 添加决策事项按钮 - 点击添加新的决策事项

        `;

        lucide.createIcons();
